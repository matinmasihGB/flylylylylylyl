app = "xhttp-relay-matin"     # این نام را به نام دلخواه خودت تغییر بده (یونیک باشد)

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
